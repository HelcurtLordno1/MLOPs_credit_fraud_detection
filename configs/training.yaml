model:
  run_name: credit-fraud-day2

  # Day 2 requirement: baseline + at least one stronger model
  candidates:
    - logistic
    - lightgbm

  logistic:
    C: 1.0
    max_iter: 1000
    solver: lbfgs
    class_weight: balanced

  lightgbm:
    n_estimators: 400
    learning_rate: 0.05
    num_leaves: 63
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    min_child_samples: 50

preprocessing:
  scaler: StandardScaler

thresholds:
  min_auc: 0.90
  min_auprc: 0.85
  min_recall: 0.92
  min_precision: 0.80
