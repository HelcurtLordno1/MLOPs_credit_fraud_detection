stages:
  prepare:
    cmd: set PYTHONPATH=src&& .venv\Scripts\python.exe -m fraud_detection.cli prepare
    deps:
      - data/raw/fraudTrain.csv
      - data/raw/fraudTest.csv
      - configs/data.yaml
      - src/fraud_detection/data/pipeline.py
      - src/fraud_detection/data/features.py
      - src/fraud_detection/data/schema.py
      - src/fraud_detection/utils/paths.py
    outs:
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/test.parquet
      - reports/metrics/day1_data_summary.json

  train:
    cmd: set PYTHONPATH=src&& .venv\Scripts\python.exe -m fraud_detection.cli train
    deps:
      - configs/train.yaml
      - src/fraud_detection/modeling/train.py
      - src/fraud_detection/modeling/evaluate.py
      - src/fraud_detection/data/features.py
      - src/fraud_detection/data/pipeline.py
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/test.parquet
    outs:
      - models/trained/best_model.joblib
      - reports/metrics/train_metrics.json

  evaluate:
    cmd: set PYTHONPATH=src&& .venv\Scripts\python.exe -m fraud_detection.cli evaluate
    deps:
      - src/fraud_detection/modeling/evaluate.py
      - src/fraud_detection/modeling/train.py
      - configs/train.yaml
      - data/processed/test.parquet
      - data/processed/train.parquet
      - data/processed/val.parquet
      - models/trained/best_model.joblib
    outs:
      - reports/metrics/test_metrics.json

  promote:
    cmd: set PYTHONPATH=src&& .venv\Scripts\python.exe -m fraud_detection.cli promote
    deps:
      - configs/train.yaml
      - reports/metrics/train_metrics.json
      - reports/metrics/test_metrics.json
      - models/trained/best_model.joblib
      - src/fraud_detection/monitoring/promotion.py
    outs:
      - models/registry/last_promotion.json

  drift:
    cmd: set PYTHONPATH=src&& .venv\Scripts\python.exe -m fraud_detection.cli drift
    deps:
      - configs/monitoring.yaml
      - data/processed/train.parquet
      - data/processed/test.parquet
      - models/registry/last_promotion.json
      - src/fraud_detection/cli.py
      - src/fraud_detection/monitoring/drift.py
    outs:
      - reports/drift/drift_report.json

  tune:
    cmd: set PYTHONPATH=src&& .venv\Scripts\python.exe -m fraud_detection.cli tune --n-trials 15
    deps:
      - configs/train.yaml
      - data/processed/train.parquet
      - data/processed/val.parquet
      - data/processed/test.parquet
      - src/fraud_detection/cli.py
      - src/fraud_detection/modeling/fine_tune.py
      - src/fraud_detection/modeling/train.py
      - src/fraud_detection/modeling/evaluate.py
    outs:
      - reports/hyperparameter_tuning/lr_tuning_results.json
      - reports/hyperparameter_tuning/lgbm_tuning_results.json
      - reports/hyperparameter_tuning/tuning_summary_report.txt
      - models/trained/best_lr_tuned_model.joblib
      - models/trained/best_lgbm_tuned_model.joblib

