name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting (flake8)
        run: |
          python -m flake8 codes/ src/ tests/ scripts/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --count --show-source --statistics

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build -f docker/Dockerfile.app -t fraud-api:ci-test .

      - name: Verify Docker image
        run: |
          docker images fraud-api:ci-test
