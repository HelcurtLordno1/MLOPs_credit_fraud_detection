name: CD Pipeline (Build & Deploy)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'       # Weekly retraining on Monday 2AM

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install linting tools
        run: pip install ruff

      - name: Lint with Ruff
        run: ruff check src/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: pytest tests/ -v

  train:
    name: Retrain Model
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc[gdrive]

      - name: Pull DVC data & artifacts
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
        run: dvc pull

      - name: Retrain model pipeline (DVC)
        run: dvc repro

  evaluate:
    name: Evaluate Model
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evaluation
        env:
          PYTHONPATH: src
        run: python -m fraud_detection.cli evaluate

  deploy:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [train, evaluate]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and Push Docker Images
        run: |
          TAG=${GITHUB_SHA::7}
          REPO="dotuandat199433/mlops_frauddetect"

          # Build and push API image
          docker build -t $REPO:api-$TAG .
          docker push $REPO:api-$TAG

          # Build and push Streamlit image
          docker build -t $REPO:streamlit-$TAG -f streamlit_app/Dockerfile .
          docker push $REPO:streamlit-$TAG

          echo "✅ Images pushed:"
          echo "  - $REPO:api-$TAG"
          echo "  - $REPO:streamlit-$TAG"
