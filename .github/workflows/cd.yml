name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/fraud-detection-api:${{ github.ref_name }}

      - name: Build and push Streamlit image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: streamlit_app/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/fraud-detection-streamlit:${{ github.ref_name }}
