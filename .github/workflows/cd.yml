name: CD Pipeline (Build & Deploy)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'       # Weekly retraining on Monday 2AM

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Lint with Ruff (src and tests)
        run: ruff check src/ tests/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        env:
          PYTHONPATH: 'src'
        run: pytest tests/ -v

  train:
    name: Retrain Model
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc[gdrive]

      - name: Pull DVC data & artifacts
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
          PYTHONPATH: 'src'
        run: |
          if [ -z "$GDRIVE_CREDENTIALS_DATA" ]; then
            echo "Warning: GDRIVE_CREDENTIALS_DATA secret not configured. Skipping dvc pull."
            echo "Set GDRIVE_CREDENTIALS_DATA in GitHub secrets to enable data pull."
          else
            dvc pull
          fi

      - name: Retrain model pipeline (DVC)
        env:
          PYTHONPATH: 'src'
        run: |
          if ! dvc repro; then
            echo "Warning: DVC repro failed. Check DVC remote, cache, and credentials."
          fi

  evaluate:
    name: Evaluate Model
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evaluation
        env:
          PYTHONPATH: src
        run: python -m fraud_detection.cli evaluate

  deploy:
    name: Build, Validate on Kind & Push
    runs-on: ubuntu-latest
    needs: [train, evaluate]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # -- Step 1: Install kind (downloaded automatically, never committed to git) --
      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      # -- Step 2: Install kubectl --
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
          kubectl version --client

      # -- Step 3: Create Kind cluster using the committed kind-config.yaml --
      - name: Create Kind cluster
        run: |
          kind create cluster --name mlops-cluster --config kind-config.yaml
          kubectl cluster-info --context kind-mlops-cluster
          kubectl get nodes

      # -- Step 4: Build Docker images locally on the runner --
      - name: Build Docker images
        run: |
          TAG=${GITHUB_SHA::7}
          docker build -t mlops_frauddetect:api-$TAG .
          docker build -t mlops_frauddetect:streamlit-$TAG -f streamlit_app/Dockerfile .
          echo "TAG=$TAG" >> $GITHUB_ENV

      # -- Step 5: Load images directly into Kind (no Docker Hub pull needed) --
      - name: Load images into Kind cluster
        run: |
          kind load docker-image mlops_frauddetect:api-${{ env.TAG }} --name mlops-cluster
          kind load docker-image mlops_frauddetect:streamlit-${{ env.TAG }} --name mlops-cluster
          echo "Images loaded into all Kind nodes successfully"

      # -- Step 6: Patch manifests with the new tag and apply to Kind --
      - name: Deploy to Kind cluster
        run: |
          sed -i "s|image: mlops_frauddetect:api-local|image: mlops_frauddetect:api-${{ env.TAG }}|g" deployment/k8s/api-deployment.yaml
          sed -i "s|image: mlops_frauddetect:streamlit-local|image: mlops_frauddetect:streamlit-${{ env.TAG }}|g" deployment/k8s/streamlit-deployment.yaml
          kubectl apply -f deployment/k8s/

      # -- Step 7: Wait for rollout and verify all pods are healthy --
      - name: Verify deployment health
        run: |
          kubectl rollout status deployment/fraud-api --timeout=120s
          kubectl rollout status deployment/streamlit --timeout=120s
          kubectl get pods,svc
          echo "All deployments are healthy"

      # -- Step 8: Tag and push verified images to Docker Hub for storage --
      - name: Push images to Docker Hub (optional)
        if: |
          secrets.DOCKERHUB_USERNAME != '' &&
          secrets.DOCKERHUB_TOKEN != ''
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          TAG=${{ env.TAG }}
          REPO="dotuandat199433/mlops_frauddetect"
          docker tag mlops_frauddetect:api-$TAG $REPO:api-$TAG
          docker tag mlops_frauddetect:streamlit-$TAG $REPO:streamlit-$TAG
          docker push $REPO:api-$TAG
          docker push $REPO:streamlit-$TAG
          echo "Pushed: $REPO:api-$TAG and $REPO:streamlit-$TAG"

