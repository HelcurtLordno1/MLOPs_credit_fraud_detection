name: Retrain and Deploy Model

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  retrain-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: dotuandat199433/mlops_frauddetect

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull DVC data & artifacts
        run: |
          dvc remote modify storage --local auth basic
          dvc remote modify storage --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify storage --local password ${{ secrets.DAGSHUB_TOKEN }}
          dvc pull

      - name: Retrain Model Pipeline
        env:
          PYTHONPATH: 'src'
        run: |
          if ! dvc repro; then
            echo "Warning: DVC repro failed. Check DVC remote, cache, and credentials."
          fi

      - name: Verify training outputs
        run: |
          if [ ! -f "models/trained/best_model.joblib" ]; then
            echo "Warning: Model file not found after training. Continuing with available artifacts."
          else
            echo "Training completed successfully. Model file verified."
          fi

      - name: Login to Docker Hub
        shell: bash
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and Push new API Image
        shell: bash
        run: |
          TAG=${GITHUB_SHA::7}
          docker build -t $IMAGE_NAME:api-$TAG -t $IMAGE_NAME:api-latest .
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Info: Docker Hub credentials not configured. Image build completed but not pushed."
          else
            docker push $IMAGE_NAME:api-$TAG
            docker push $IMAGE_NAME:api-latest
          fi
          echo "API_TAG=api-$TAG" >> "$GITHUB_ENV"

      - name: Build and Push new Streamlit Image
        shell: bash
        run: |
          TAG=${GITHUB_SHA::7}
          docker build -t $IMAGE_NAME:streamlit-$TAG -t $IMAGE_NAME:streamlit-latest -f streamlit_app/Dockerfile .
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Info: Docker Hub credentials not configured. Image build completed but not pushed."
          else
            docker push $IMAGE_NAME:streamlit-$TAG
            docker push $IMAGE_NAME:streamlit-latest
          fi
          echo "STREAMLIT_TAG=streamlit-$TAG" >> "$GITHUB_ENV"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4