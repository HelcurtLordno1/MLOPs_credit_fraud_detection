name: Retrain and Deploy Model

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  retrain-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: dotuandat199433/mlops_frauddetect

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc[gdrive]

      - name: Pull data and models (DVC)
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
        run: |
          dvc pull

      - name: Retrain Model Pipeline
        run: |
          dvc repro

      - name: Login to Docker Hub
        shell: bash
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and Push new API Image
        shell: bash
        run: |
          TAG=${GITHUB_SHA::7}
          docker build -t $IMAGE_NAME:api-$TAG -t $IMAGE_NAME:api-latest .
          docker push $IMAGE_NAME:api-$TAG
          docker push $IMAGE_NAME:api-latest

          echo "API_TAG=api-$TAG" >> "$GITHUB_ENV"

      - name: Build and Push new Streamlit Image
        shell: bash
        run: |
          TAG=${GITHUB_SHA::7}
          docker build -t $IMAGE_NAME:streamlit-$TAG -t $IMAGE_NAME:streamlit-latest -f streamlit_app/Dockerfile .
          docker push $IMAGE_NAME:streamlit-$TAG
          docker push $IMAGE_NAME:streamlit-latest

          echo "STREAMLIT_TAG=streamlit-$TAG" >> "$GITHUB_ENV"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"

          if echo "$KUBECONFIG_DATA" | grep -q "apiVersion:"; then
            printf "%s" "$KUBECONFIG_DATA" > "$HOME/.kube/config"
          else
            echo "$KUBECONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          fi

          chmod 600 "$HOME/.kube/config"
          kubectl version --client

      - name: Apply Kubernetes manifests
        shell: bash
        run: |
          kubectl apply -f deployment/k8s/

      - name: Update image tags in deployment
        shell: bash
        run: |
          kubectl set image deployment/fraud-api fraud-api=$IMAGE_NAME:$API_TAG
          kubectl set image deployment/streamlit streamlit=$IMAGE_NAME:$STREAMLIT_TAG

      - name: Rollout restart and verify
        shell: bash
        run: |
          kubectl rollout restart deployment/fraud-api
          kubectl rollout restart deployment/mlflow
          kubectl rollout restart deployment/streamlit

          kubectl rollout status deployment/fraud-api --timeout=300s
          kubectl rollout status deployment/mlflow --timeout=300s
          kubectl rollout status deployment/streamlit --timeout=300s
