name: Retrain and Deploy Model

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  retrain-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: dotuandat199433/mlops_frauddetect

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull DVC data & artifacts
        run: |
          if [ -n "${{ secrets.DAGSHUB_USERNAME }}" ] && [ -n "${{ secrets.DAGSHUB_TOKEN }}" ]; then
            if dvc remote list | grep -q '^storage'; then
              dvc remote modify storage --local auth basic || true
              dvc remote modify storage --local user ${{ secrets.DAGSHUB_USERNAME }} || true
              dvc remote modify storage --local password ${{ secrets.DAGSHUB_TOKEN }} || true
              if ! dvc pull; then
                echo "Warning: dvc pull failed. Continuing with repository data."
              fi
            else
              echo "Warning: DVC remote 'storage' not found. Continuing with repository data."
            fi
          else
            echo "Info: DAGsHub secrets not configured. Skipping dvc pull and using repository data."
          fi

      - name: Ensure raw datasets are available
        run: |
          mkdir -p data/raw
          if [ ! -f "data/raw/fraudTrain.csv" ] && [ -f "fraudTrain.csv" ]; then
            cp fraudTrain.csv data/raw/fraudTrain.csv
          fi
          if [ ! -f "data/raw/fraudTest.csv" ] && [ -f "fraudTest.csv" ]; then
            cp fraudTest.csv data/raw/fraudTest.csv
          fi
          test -f data/raw/fraudTrain.csv
          test -f data/raw/fraudTest.csv

      - name: Retrain Model Pipeline
        env:
          PYTHONPATH: 'src'
        run: |
          python -m fraud_detection.cli prepare
          python -m fraud_detection.cli train
          python -m fraud_detection.cli evaluate
          python -m fraud_detection.cli promote
          python -m fraud_detection.cli drift

      - name: Verify training outputs
        run: |
          if [ ! -f "models/trained/best_model.joblib" ]; then
            echo "Warning: Model file not found after training. Continuing with available artifacts."
          else
            echo "Training completed successfully. Model file verified."
          fi

      - name: Login to Docker Hub
        shell: bash
        run: |
          if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ] && [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          else
            echo "Info: Docker Hub credentials not configured. Skipping docker login."
          fi

      - name: Build and Push new API Image
        shell: bash
        run: |
          TAG=${GITHUB_SHA::7}
          docker build -t $IMAGE_NAME:api-$TAG -t $IMAGE_NAME:api-latest .
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ] || [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "Info: Docker Hub credentials not configured. Image build completed but not pushed."
          else
            docker push $IMAGE_NAME:api-$TAG
            docker push $IMAGE_NAME:api-latest
          fi
          echo "API_TAG=api-$TAG" >> "$GITHUB_ENV"

      - name: Build and Push new Streamlit Image
        shell: bash
        run: |
          TAG=${GITHUB_SHA::7}
          docker build -t $IMAGE_NAME:streamlit-$TAG -t $IMAGE_NAME:streamlit-latest -f streamlit_app/Dockerfile .
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ] || [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "Info: Docker Hub credentials not configured. Image build completed but not pushed."
          else
            docker push $IMAGE_NAME:streamlit-$TAG
            docker push $IMAGE_NAME:streamlit-latest
          fi
          echo "STREAMLIT_TAG=streamlit-$TAG" >> "$GITHUB_ENV"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          if [ -n "${{ secrets.KUBECONFIG }}" ]; then
            mkdir -p "$HOME/.kube"
            printf '%s' '${{ secrets.KUBECONFIG }}' > "$HOME/.kube/config"
            chmod 600 "$HOME/.kube/config"
          else
            echo "Info: KUBECONFIG secret not configured. Skipping kubeconfig setup."
          fi

      - name: Deploy updated images to Kubernetes
        run: |
          if [ -n "${{ secrets.KUBECONFIG }}" ]; then
            sed -i "s|image: mlops_frauddetect:api-local|image: $IMAGE_NAME:${{ env.API_TAG }}|g" deployment/k8s/api-deployment.yaml
            sed -i "s|image: mlops_frauddetect:streamlit-local|image: $IMAGE_NAME:${{ env.STREAMLIT_TAG }}|g" deployment/k8s/streamlit-deployment.yaml
            kubectl apply -f deployment/k8s/
            kubectl rollout status deployment/fraud-api --timeout=300s
            kubectl rollout status deployment/mlflow --timeout=300s
            kubectl rollout status deployment/streamlit --timeout=300s
          else
            echo "Info: KUBECONFIG secret not configured. Skipping Kubernetes deployment."
          fi