services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mlflow:
    build:
      context: .
      dockerfile: deployment/mlflow/Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow}
    depends_on:
      - postgres
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FRAUD_DETECTION_ROOT: /app
      FRAUD_DETECTION_MODEL_PATH: /app/models/trained/production_model.joblib
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_REGISTRY_URI: http://mlflow:5000
    depends_on:
      - mlflow
    volumes:
      - .:/app
    ports:
      - "${API_PORT:-8000}:8000"

  streamlit:
    build:
      context: .
      dockerfile: streamlit_app/Dockerfile
    environment:
      FRAUD_DETECTION_ROOT: /app
      API_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - .:/app
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"

  prometheus:
    image: prom/prometheus:v3.2.1
    depends_on:
      - api
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deployment/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana-oss:11.5.1
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./deployment/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployment/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres_data:
  mlflow_artifacts:
